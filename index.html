<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="机甲对战 - MECH BATTLE: 一个双人对战的像素风格机甲格斗游戏">
    <meta name="keywords" content="机甲对战, MECH BATTLE, 像素游戏, 双人游戏, 格斗游戏">
    <title>机甲对战 - MECH BATTLE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container" role="main" aria-label="机甲对战游戏">
        <div id="menu-screen" class="screen active" role="region" aria-label="主菜单">
            <div class="title-container">
                <h1 class="game-title">
                    <span class="title-line">MECH</span>
                    <span class="title-line accent">BATTLE</span>
                </h1>
                <p class="subtitle">机甲对战</p>
            </div>
            
            <div class="controls-info" role="group" aria-label="游戏控制说明">
                <div class="player-controls" role="region" aria-label="玩家1控制">
                    <h3 class="player-title red">玩家1</h3>
                    <div class="key-layout">
                        <div class="key-row">
                            <span class="key" data-key="W" role="button" tabindex="0" aria-label="W键 - 跳跃">W</span>
                            <span class="key-desc">跳跃</span>
                        </div>
                        <div class="key-row">
                            <span class="key" data-key="A" role="button" tabindex="0" aria-label="A键 - 向左移动">A</span>
                            <span class="key" data-key="S" role="button" tabindex="0" aria-label="S键 - 向下移动">S</span>
                            <span class="key" data-key="D" role="button" tabindex="0" aria-label="D键 - 向右移动">D</span>
                            <span class="key-desc">移动</span>
                        </div>
                        <div class="key-row">
                            <span class="key attack" data-key="F" role="button" tabindex="0" aria-label="F键 - 攻击">F</span>
                            <span class="key-desc">攻击</span>
                            <span class="key defend" data-key="G" role="button" tabindex="0" aria-label="G键 - 防御">G</span>
                            <span class="key-desc">防御</span>
                        </div>
                    </div>
                </div>
                
                <div class="vs-divider" aria-hidden="true">
                    <span>VS</span>
                </div>
                
                <div class="player-controls" role="region" aria-label="玩家2控制">
                    <h3 class="player-title blue">玩家2</h3>
                    <div class="key-layout">
                        <div class="key-row">
                            <span class="key" data-key="↑" role="button" tabindex="0" aria-label="上箭头键 - 跳跃">↑</span>
                            <span class="key-desc">跳跃</span>
                        </div>
                        <div class="key-row">
                            <span class="key" data-key="←" role="button" tabindex="0" aria-label="左箭头键 - 向左移动">←</span>
                            <span class="key" data-key="↓" role="button" tabindex="0" aria-label="下箭头键 - 向下移动">↓</span>
                            <span class="key" data-key="→" role="button" tabindex="0" aria-label="右箭头键 - 向右移动">→</span>
                            <span class="key-desc">移动</span>
                        </div>
                        <div class="key-row">
                            <span class="key attack" data-key="L" role="button" tabindex="0" aria-label="L键 - 攻击">L</span>
                            <span class="key-desc">攻击</span>
                            <span class="key defend" data-key="K" role="button" tabindex="0" aria-label="K键 - 防御">K</span>
                            <span class="key-desc">防御</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <button id="start-btn" class="pixel-btn" aria-label="开始游戏">
                <span class="btn-text">开始游戏</span>
                <span class="btn-shadow" aria-hidden="true"></span>
            </button>
        </div>
        
        <div id="game-screen" class="screen" role="region" aria-label="游戏画面">
            <canvas id="game-canvas" aria-label="机甲对战游戏画面" role="img"></canvas>
            <div id="health-bars" role="region" aria-label="生命值显示">
                <div class="health-container player1">
                    <span class="player-label" aria-label="玩家1">P1</span>
                    <div class="health-bar" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" aria-label="玩家1生命值">
                        <div class="health-fill" id="p1-health" aria-hidden="true"></div>
                    </div>
                </div>
                <div class="health-container player2">
                    <span class="player-label" aria-label="玩家2">P2</span>
                    <div class="health-bar" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" aria-label="玩家2生命值">
                        <div class="health-fill" id="p2-health" aria-hidden="true"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="gameover-screen" class="screen" role="region" aria-label="游戏结束画面">
            <div class="gameover-content">
                <h2 class="winner-text" id="winner-text" aria-live="polite" aria-atomic="true">玩家1 获胜!</h2>
                <div class="winner-mech" id="winner-mech" role="img" aria-label="获胜机甲"></div>
                <div class="gameover-buttons">
                    <button id="restart-btn" class="pixel-btn" aria-label="再来一局">
                        <span class="btn-text">再来一局</span>
                    </button>
                    <button id="menu-btn" class="pixel-btn secondary" aria-label="返回主菜单">
                        <span class="btn-text">返回菜单</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
